<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plantilla Maestra - Desarrollo Web</title>

    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 20px; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; }
        button { background: #6c5ce7; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; width: 100%; font-size: 16px; }
        button:hover { background: #a29bfe; }
        canvas { margin-top: 30px; }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 Registro de Actividades</h2>

    <form id="mainForm">
        <div class="form-group">
            <label>Seleccionar Proyecto:</label>
            <select id="miSelect" style="width: 100%;">
                <option value="">Buscar proyecto...</option>
                <option value="Web">Desarrollo Web 🌐</option>
                <option value="Python">Backend Python 🐍</option>
                <option value="Diseño">Diseño UI/UX 🎨</option>
            </select>
        </div>

        <div class="form-group">
            <label>Horas Invertidas:</label>
            <input type="number" id="valor" placeholder="Ej: 5">
        </div>

        <button type="submit" id="btnEnviar">Guardar Registro</button>
    </form>

    <canvas id="graficoCanvas"></canvas>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
$(document).ready(function() {
    // 1. Inicializar Select2
    $('#miSelect').select2({ placeholder: "Selecciona una opción" });

    // 2. Configurar Gráfico Inicial
    const ctx = document.getElementById('graficoCanvas').getContext('2d');
    const miChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['Web', 'Python', 'Diseño'],
            datasets: [{
                label: 'Horas',
                data: [0, 0, 0],
                backgroundColor: ['#6c5ce7', '#00cec9', '#fab1a0']
            }]
        }
    });

    // 3. Lógica del Formulario y SweetAlert
    $('#mainForm').on('submit', function(e) {
        e.preventDefault();

        const opcion = $('#miSelect').val();
        const cantidad = $('#valor').val();

        if (!opcion || cantidad <= 0) {
            Swal.fire('Error', 'Completa los campos correctamente', 'error');
            return;
        }

        // Actualizar datos del gráfico
        const index = miChart.data.labels.indexOf(opcion);
        miChart.data.datasets[0].data[index] += parseFloat(cantidad);
        miChart.update();

        Swal.fire({
            title: '¡Éxito!',
            text: `Registraste ${cantidad} horas en ${opcion}`,
            icon: 'success',
            confirmButtonColor: '#6c5ce7'
        });

        this.reset();
        $('#miSelect').val(null).trigger('change'); // Limpiar Select2
    });
});
</script>

</body>
</html>
